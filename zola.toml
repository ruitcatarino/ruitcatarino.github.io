# The URL the site will be built for
base_url = "https://ruitcatarino.github.io"
title = "CodeMemoirs"
description = "A software engineer working as a backend developer who loves to code and learn new things."
compile_sass = true
build_search_index = true
taxonomies = [{ name = "tags" }]
theme = "apollo"

[markdown]
external_links_target_blank = true

[markdown.highlighting]
theme = "catppuccin-mocha"

[extra]
theme = "toggle-auto"
toc = true
fancy_code = true
dynamic_note = true
socials = [
  { name = "github", url = "https://github.com/ruitcatarino/", icon = "github" },
  { name = "bluesky", url = "https://bsky.app/profile/ruitcatarino.bsky.social/", icon = "bluesky" },
  { name = "linkedin", url = "https://www.linkedin.com/in/ruitcatarino/", icon = "linkedin" },
]
menu = [
    { name = "/posts", url = "/posts", weight = 1 },
    { name = "/tags", url = "/tags", weight = 2 },
]

[extra.analytics]
enabled = true

[extra.analytics.umami]
website_id = "3183e0b3-1313-480c-af61-0b3d30a7161a"
